name: "🐛 Bug Report"
description: "Create a report to help us improve SplitDude"
title: "[BUG]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below to help us reproduce and resolve the issue.
  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      placeholder: "A clear and concise description of what the bug is."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
      placeholder: "A clear description of what you expected to happen."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: "Environment & Context"
      placeholder: |
        - OS: [e.g. macOS, Windows]
        - Browser: [e.g. Chrome, Safari]
        - Version: [e.g. v1.0.0]
        - Local setup or Live Demo?
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: "Console Logs / Screenshots / API Responses"
      placeholder: "Paste any console logs, AWS API responses, or drop screenshots here."
    validations:
      required: false
