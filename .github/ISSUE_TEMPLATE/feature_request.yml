name: "🚀 Feature Request"
description: "Suggest an idea or enhancement for SplitDude"
title: "[FEATURE]: "
labels: ["enhancement", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make SplitDude even better? Let us know!
  - type: textarea
    id: problem
    attributes:
      label: "Is your feature request related to a problem?"
      placeholder: "A clear and concise description of what the problem or friction point is. E.g., 'I find it frustrating when...'"
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: "Describe the solution you'd like"
      placeholder: "A clear and concise description of what you want to happen or how the feature should behave."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Describe alternatives you've considered"
      placeholder: "A clear and concise description of any alternative solutions or workarounds you've thought of."
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: "Additional Context"
      placeholder: "Add any other context, designs, screenshots, mockups, or details about the feature request here."
    validations:
      required: false
